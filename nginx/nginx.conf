load_module modules/ngx_http_brotli_static_module.so;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    access_log    off;
    server_tokens off;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        charset utf-8;

        error_page 404 /404.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header Vary "Accept-Encoding" always;

        brotli_static on;

        location /gameoflife/ {
            return 301 https://playgameoflife.com/;
        }

        # Resolve extensionless URLs (e.g. /edwin/projects -> projects.html).
        # A bare directory is not matched by $uri, so nginx still issues its
        # default trailing-slash redirect for real directories.
        location / {
            try_files $uri $uri.html $uri/ @noslash;
        }

        # Fallback for a trailing slash on a page that is really a file
        # (/edwin/projects/ -> /edwin/projects.html); genuine misses 404.
        location @noslash {
            rewrite ^/(.+)/$ /$1 last;
            return 404;
        }

        # Only "expires" here: an add_header in a location block would
        # drop all inherited server-level add_header lines
        location ~* \.(?:html|css|js|json)$ {
            expires 1d;
        }

        location ~* \.(?:jpg|jpeg|webp|png|woff2)$ {
            expires 1y;
        }
    }
}
