<html>
<head>
<title>Voorbeeld</title>
<link rel="stylesheet" type="text/css" href="cursus.css">
<style type="text/css">
#mijnlayer {
	position: absolute;
	top: 300px;
	left: 30px;
	padding: 4px;
}
</style>
<script language="JavaScript">
function setBackgroundColor( layer, color ) {
	if( document.getElementById ) {
		document.getElementById( layer ).style.backgroundColor = color;
	} else if( document.all ) {
		return document.all[layer].style.backgroundColor = color;
	} else {
		return document[layer].bgColor = color;
	}
}
</script>

</head>
<body>

<div id="mijnlayer">
<h3>Dit is een layer</h3>
<p>Deze tekst staan in een layer.</p>
</div>

<h2 class=cursus>DHTML in Netscape 4 en hoger en IE 4 en hoger</h2>

<form>
<h3>Dit werkt in alle recente browsers vanaf Netscape 4:</h4>
<input type=button onClick="setBackgroundColor('mijnlayer', 'lightsalmon')" value="setBackgroundColor('mijnlayer', 'lightsalmon')">
<input type=button onClick="setBackgroundColor('mijnlayer', 'khaki')" value="setBackgroundColor('mijnlayer', 'khaki')">
<input type=button onClick="setBackgroundColor('mijnlayer', 'lavender')" value="setBackgroundColor('mijnlayer', 'lavender')">
</form>

</body>
</html>
