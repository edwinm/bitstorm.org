<html>
<head>
<title>Voorbeeld</title>
<link rel="stylesheet" type="text/css" href="cursus.css">
<style type="text/css">
#mijnlayer {
	position: absolute;
	top: 300px;
	left: 400px;
	background-color: orange;
}
</style>
<script language="JavaScript">
function getStyle( layer ) {
	if( document.getElementById ) {
		return document.getElementById( layer ).style
	} else if( document.all ) {
		return document.all[layer].style
	} else {
		return document[layer]
	}
}
function writeText( layer,text ) {
	if( document.getElementById ) {
		document.getElementById( layer ).innerHTML = text;
	} else if( document.all ) {
		document.all[layer].innerHTML = text;
	} else {
		document[layer].document.open();
		document[layer].document.write( text );
		document[layer].document.close();
	}
}
</script>

</head>
<body>

<div id="mijnlayer">
Deze tekst staan in een layer.
</div>

<h2 class=cursus>DHTML in Netscape 4 en hoger en IE 4 en hoger</h2>

<form>
<h3>Dit werkt in alle recente browsers vanaf Netscape 4:</h4>
<input type=button onClick="writeText('mijnlayer', 'Dit is een andere tekst')" value="writeText('mijnlayer', 'Dit is een andere tekst')">
<input type=button onClick="writeText('mijnlayer', '<h3>En dit is een kopje</h3>')" value="writeText('mijnlayer', '<h3>En dit is een kopje</h3>')">
</form>

</body>
</html>
