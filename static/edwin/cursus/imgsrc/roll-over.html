<html>
<head>
<title>Voorbeeld Roll over</title>
<link rel="stylesheet" type="text/css" href="../cursus.css">
</head>
<body>

<h3 class=cursus>Dit werkt in alle browsers vanaf Netscape 3</h4>

<p>Beweeg de muis over de cijfers.</p>

<img src="1.gif" name="cijfer1" width="100" height="100" onMouseOver="document.cijfer1.src='1selected.gif'" onMouseOut="document.cijfer1.src='1.gif'">
<img src="2.gif" name="cijfer2" width="100" height="100" onMouseOver="document.cijfer2.src='2selected.gif'" onMouseOut="document.cijfer2.src='2.gif'">

</body>
</html>
